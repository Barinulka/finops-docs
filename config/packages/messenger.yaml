framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 10000
                    multiplier: 2
                    max_delay: 60000

            failed:
                dsn: '%env(MESSENGER_FAILED_TRANSPORT_DSN)%'

            sync: 'sync://'

        routing:
            App\Message\ParseDocumentMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
                failed: 'in-memory://'
