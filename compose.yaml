x-app-environment: &app-environment
  APP_ENV: dev
  APP_DEBUG: "1"
  DATABASE_URL: "postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8"
  MESSENGER_TRANSPORT_DSN: "redis://redis:6379/messages"
  MESSENGER_FAILED_TRANSPORT_DSN: "redis://redis:6379/failed_messages"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_PUBLIC_ENDPOINT: "http://127.0.0.1:19000"
  MINIO_ACCESS_KEY: "app"
  MINIO_SECRET_KEY: "ChangeMeMinioPassword"
  MINIO_BUCKET: "crm-documents"
  MINIO_REGION: "us-east-1"
  PARSER_BASE_URI: "http://parser:8001"

x-app-depends-on: &app-depends-on
  database:
    condition: service_healthy
  redis:
    condition: service_healthy
  minio:
    condition: service_started
  parser:
    condition: service_healthy
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    working_dir: /app
    environment: *app-environment
    volumes:
      - .:/app
      - dart_sass_data:/app/var/dart-sass
    depends_on: *app-depends-on
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    working_dir: /app
    command: ["php", "bin/console", "messenger:consume", "async", "-vv"]
    environment: *app-environment
    volumes:
      - .:/app
      - dart_sass_data:/app/var/dart-sass
    depends_on: *app-depends-on
    restart: unless-stopped
  parser:
    build:
      context: .
      dockerfile: docker/parser/Dockerfile
    working_dir: /app/parser
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      timeout: 5s
      retries: 5
      start_period: 10s
###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

  redis:
    image: redis:${REDIS_VERSION:-7.4}-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data:rw

  minio:
    image: minio/minio:${MINIO_VERSION:-latest}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-app}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ChangeMeMinioPassword}
    volumes:
      - minio_data:/data:rw

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
  redis_data:
  minio_data:
  dart_sass_data: